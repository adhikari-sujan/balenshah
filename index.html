<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Balen Shah </title>
    
    <link rel="stylesheet" href="style.css">

    <!-- Awsome Fonts icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font ( Anton, Akshar, Quicksand) -->
    <link href="https://fonts.googleapis.com/css2?family=Akshar:wght@300..700&family=Anton&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

</head>


<body>
    
     <!-- HEADER NAV BAR =========================================== -->
    <header>

        <nav>
            <div class="logo"> <a href="#"> बालेन </a> </div>

            <ul>
                <li><a href="#about"> About </a></li>
                <li><a href="#gallery"> Gallery </a></li>
                <li><a href="#socials"> Socials </a></li>

                <a class="btn" href="mailto:"> Contact </a>
            </ul>
            
            <div class="toggle-bar">
                <i class="fa-solid fa-bars"></i>
            </div>

        </nav>

        <ul class="sidebar" >
                <li><a href="#about" onclick="closeMenu()"> About </a></li>
                <li><a href="#gallery" onclick="closeMenu()"> Gallery </a></li>
                <li><a href="#socials" onclick="closeMenu()"> Socials </a></li>

                <a class="btn" href="mailto:" onclick="closeMenu()"> Contact </a>
            </ul>

    </header>
    <!-- HEADER FINISHED =============================================== -->


    <!-- MAIN CONTENTS =================================================== -->

    <main>

    <section class="hero"> 

        <div class="pill"> <h3> Engineer . Artist . Leader  </h3> </div>

        <h1> Balendra Shah </h1>

        <div id="home-photo"> <img src="images/balen-in-chair.png"> </div>
        
    </section>

    <section id="about">

    </section>

    </main>



    <footer> 
        <h3> this is footer !</h3>
    </footer>



    <!-- JAVA SCRIPT ==================================== -->
    <script>
        const toggleBtn = document.querySelector('.toggle-bar')
        const toggleBtnIcon = document.querySelector('.toggle-bar i')
        const sideBar = document.querySelector('.sidebar')

        toggleBtn.onclick = function () {
            sideBar.classList.toggle('open')
            const isOpen = sideBar.classList.contains('open')

            toggleBtnIcon.className = isOpen
            ? 'fa-solid fa-xmark'
            : 'fa-solid fa-bars'

        }

function closeMenu() {
  document.querySelector('.sidebar').classList.remove('open');

   toggleBtnIcon.className = 'fa-solid fa-bars'
  
}

    </script>

    
</body>
</html>
